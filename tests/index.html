<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Тесты — Роза</title>
  <style>
    body { font-family: monospace; background: #1e1e2e; color: #cdd6f4; margin: 0; padding: 24px; }
    h1 { color: #cba6f7; margin-bottom: 24px; }
    h2 { color: #89b4fa; font-size: 0.95rem; margin: 20px 0 6px; border-left: 3px solid #89b4fa; padding-left: 10px; }
    .test { padding: 4px 0 4px 16px; font-size: 0.88rem; }
    .pass { color: #a6e3a1; }
    .fail { color: #f38ba8; }
    .summary { font-size: 1rem; font-weight: bold; padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; }
    .all-pass { background: rgba(166,227,161,0.15); color: #a6e3a1; border: 1px solid #a6e3a1; }
    .has-failures { background: rgba(243,139,168,0.15); color: #f38ba8; border: 1px solid #f38ba8; }
  </style>
</head>
<body>
  <h1>Unit-тесты</h1>
  <div id="output"></div>

  <script src="logic.js"></script>
  <script src="runner.js"></script>
  <script src="logic.test.js"></script>

</html>
